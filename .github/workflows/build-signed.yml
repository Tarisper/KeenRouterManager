name: Build and Sign KeenRouterManager

on:
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build-signed:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Apple Developer certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Display Xcode version
        run: xcodebuild -version

      - name: Build and archive project
        run: |
          xcodebuild archive \
            -project KeenRouterManager.xcodeproj \
            -scheme KeenRouterManager \
            -configuration Release \
            -archivePath build/KeenRouterManager.xcarchive \
            -allowProvisioningUpdates

      - name: Export archive for distribution
        run: |
          xcodebuild -exportArchive \
            -archivePath build/KeenRouterManager.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/Distribution

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-build-artifacts
          path: build/Distribution/
          retention-days: 30
