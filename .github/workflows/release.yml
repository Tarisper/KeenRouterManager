name: Release KeenRouterManager

on:
  push:
    tags:
      - 'v*'

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display Xcode version
        run: xcodebuild -version

      - name: Build app without code signing
        run: |
          xcodebuild build \
            -project KeenRouterManager.xcodeproj \
            -scheme KeenRouterManager \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app bundle
        run: |
          mkdir -p build/Distribution
          cp -R build/Build/Products/Release/KeenRouterManager.app build/Distribution/
          ditto -c -k --sequesterRsrc --keepParent build/Distribution/KeenRouterManager.app build/Distribution/KeenRouterManager.app.zip

      - name: Create DMG
        run: |
          mkdir -p build/DMG
          cp -R build/Distribution/KeenRouterManager.app build/DMG/
          hdiutil create -volname "KeenRouterManager" \
            -srcfolder build/DMG \
            -ov -format UDZO build/KeenRouterManager.dmg

      - name: Get tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Distribution/KeenRouterManager.app.zip
            build/KeenRouterManager.dmg
          draft: false
          prerelease: false
          name: Release ${{ steps.tag.outputs.VERSION }}
          body: |
            KeenRouterManager ${{ steps.tag.outputs.VERSION }}

            Downloads:
            - KeenRouterManager.app.zip
            - KeenRouterManager.dmg

            Installation:
            1. Download the DMG or ZIP file.
            2. Open the DMG or unzip the archive.
            3. Move KeenRouterManager.app to Applications.
            4. Launch the app.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
